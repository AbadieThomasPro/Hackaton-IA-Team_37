services:
  back:
    build: ./server
    ports:
      - "3000:3000"
    environment:
      OLLAMA_URL: ${OLLAMA_URL}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      PORT: 3000
    extra_hosts:
      - "host.docker.internal:host-gateway"

  front:
    build: ./client
    ports:
      - "4200:80"
    depends_on:
      - back
